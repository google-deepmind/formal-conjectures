runtime: nodejs20

instance_class: F1

automatic_scaling:
  max_instances: 1

env_variables:
  ALLOWED_ORIGIN: "REPLACE_WITH_SITE_ORIGIN"
  GH_REPO_OWNER: "REPLACE_WITH_REPO_OWNER"
  GH_REPO_NAME: "REPLACE_WITH_REPO_NAME"
  # Secrets (GH_CLIENT_ID, GH_CLIENT_SECRET, GH_READ_TOKEN) are loaded from
  # Google Cloud Secret Manager at startup. See README.md for setup.
